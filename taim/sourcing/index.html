<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Sourcing — AgnesTheSecond</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #263350;
    --text: #e9f4ff;
    --text2: #8ba3c7;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

  /* ── Top Nav ────────────────────────────────── */
  .topnav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 32px; height: 56px; gap: 32px; flex-shrink: 0;
  }
  .topnav .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--accent); margin-right: 16px;
  }
  .topnav .logo span { color: var(--accent2); }
  .topnav a {
    color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 600;
    letter-spacing: .5px; padding: 16px 4px;
    border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
  }
  .topnav a:hover { color: var(--text); }
  .topnav a.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* ── Main Layout ─────────────────────────────── */
  .main {
    flex: 1; overflow-y: auto; padding: 32px;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* ── Input Form ──────────────────────────────── */
  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; margin-bottom: 32px;
  }
  .form-card h2 { font-size: 22px; margin-bottom: 4px; }
  .form-card .subtitle { color: var(--text2); font-size: 13px; margin-bottom: 24px; }

  .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-start; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .form-group input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 12px 16px; font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text2); opacity: .6; }

  /* ── Ingredient Tags ────────────────────────── */
  .tag-input-wrap {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 48px; align-items: center; cursor: text;
    position: relative; transition: border-color .2s;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag {
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
    padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 6px;
  }
  .tag .remove { cursor: pointer; opacity: .7; font-size: 16px; line-height: 1; }
  .tag .remove:hover { opacity: 1; }
  .tag-input {
    background: transparent; border: none; color: var(--text);
    font-size: 14px; font-family: inherit; outline: none;
    flex: 1; min-width: 120px;
  }
  .tag-input::placeholder { color: var(--text2); opacity: .6; }

  /* ── Autocomplete dropdown ──────────────────── */
  .autocomplete {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-top: 4px; max-height: 200px; overflow-y: auto;
    z-index: 100; display: none;
  }
  .autocomplete.open { display: block; }
  .ac-item {
    padding: 10px 14px; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ac-item:hover, .ac-item.active { background: var(--surface2); }
  .ac-item .count { color: var(--text2); font-size: 11px; }

  /* ── Source Button ──────────────────────────── */
  .btn-source {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 10px;
    padding: 12px 32px; font-size: 15px; font-weight: 600;
    font-family: 'Space Grotesk', sans-serif; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-source:hover { opacity: .9; }
  .btn-source:active { transform: scale(.98); }
  .btn-source:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Summary Bar ─────────────────────────────── */
  .summary-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .stat-card .label { font-size: 11px; text-transform: uppercase; color: var(--text2); letter-spacing: .5px; margin-bottom: 4px; }
  .stat-card .value { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent2); }
  .stat-card .value.warn { color: var(--warn); }
  .stat-card .value.danger { color: var(--danger); }

  /* ── Results ─────────────────────────────────── */
  .results-title {
    font-size: 18px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .results-title .product-name { color: var(--accent2); }

  .ingredient-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 16px; overflow: hidden;
    transition: border-color .2s;
  }
  .ingredient-card:hover { border-color: var(--accent); }
  .ingredient-card.unmatched { border-color: var(--danger); opacity: .8; }

  .ing-header {
    padding: 20px 24px; cursor: pointer;
    display: flex; align-items: center; gap: 16px;
    user-select: none;
  }
  .ing-header .arrow { color: var(--text2); transition: transform .2s; font-size: 14px; }
  .ingredient-card.open .ing-header .arrow { transform: rotate(90deg); }
  .ing-name { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; flex: 1; }
  .ing-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .3px;
  }
  .badge.matched { background: rgba(0,212,170,.15); color: var(--accent2); }
  .badge.unmatched-b { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge.single-source { background: rgba(245,158,11,.15); color: var(--warn); }
  .badge.risk { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge.suppliers { background: rgba(108,99,255,.15); color: var(--accent); }

  .ing-detail { display: none; padding: 0 24px 24px; border-top: 1px solid var(--border); }
  .ingredient-card.open .ing-detail { display: block; }

  /* ── Supplier Table ──────────────────────────── */
  .sup-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
  .sup-table th {
    text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text2);
    letter-spacing: .5px; padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .sup-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .sup-table tr:last-child td { border-bottom: none; }
  .sup-table tr:hover { background: var(--surface2); }

  .tier-badge {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    text-transform: uppercase;
  }
  .tier-badge.low { background: rgba(0,212,170,.15); color: var(--accent2); }
  .tier-badge.medium { background: rgba(245,158,11,.15); color: var(--warn); }
  .tier-badge.high { background: rgba(239,68,68,.15); color: var(--danger); }

  .cert-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .cert-chip {
    font-size: 10px; background: var(--surface2); color: var(--text2);
    padding: 2px 6px; border-radius: 4px;
  }

  .benchmark-row {
    margin-top: 12px; padding: 12px 16px;
    background: var(--surface2); border-radius: 10px;
    font-size: 13px; display: flex; gap: 24px; flex-wrap: wrap;
  }
  .benchmark-row .bm-label { color: var(--text2); font-size: 11px; }
  .benchmark-row .bm-val { font-weight: 600; color: var(--accent2); }

  .alt-matches {
    margin-top: 10px; font-size: 12px; color: var(--text2);
  }
  .alt-matches span { color: var(--accent); cursor: pointer; }
  .alt-matches span:hover { text-decoration: underline; }

  /* ── Supplier Coverage ───────────────────────── */
  .coverage-section { margin-top: 32px; }
  .coverage-section h3 { font-size: 16px; margin-bottom: 12px; }

  /* ── Combo cards ─────────────────────────────── */
  .combos-wrap { display: flex; flex-direction: column; gap: 16px; }
  .combo-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; transition: border-color .2s;
  }
  .combo-card:hover { border-color: var(--accent); }
  .combo-header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .combo-strategy {
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--accent2);
  }
  .combo-count {
    font-size: 12px; background: rgba(108,99,255,.15); color: var(--accent);
    padding: 2px 10px; border-radius: 20px; font-weight: 600;
  }
  .combo-desc { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
  .combo-suppliers { display: flex; flex-direction: column; gap: 10px; }
  .combo-supplier {
    background: var(--surface2); border-radius: 10px; padding: 12px 14px;
  }
  .combo-sup-top {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
  }
  .combo-sup-name { font-weight: 600; font-size: 14px; }

  /* ── Coverage bar ────────────────────────────── */
  .coverage-bar-wrap {
    position: relative; width: 120px; height: 22px;
    background: var(--surface2); border-radius: 6px; overflow: hidden;
  }
  .coverage-bar {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 6px; min-width: 2px;
  }
  .coverage-label {
    position: relative; z-index: 1; font-size: 11px; font-weight: 600;
    line-height: 22px; padding: 0 8px; white-space: nowrap;
  }

  /* ── Chat Link ───────────────────────────────── */
  .chat-prompt {
    margin-top: 24px; padding: 20px; text-align: center;
    background: var(--surface); border: 1px dashed var(--border); border-radius: 14px;
  }
  .chat-prompt p { color: var(--text2); font-size: 14px; margin-bottom: 12px; }
  .chat-prompt a {
    color: var(--accent2); font-weight: 600; text-decoration: none;
    font-size: 14px;
  }
  .chat-prompt a:hover { text-decoration: underline; }

  /* spinner */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent2); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sup-link {
    color: var(--accent2); text-decoration: none; transition: color .2s;
  }
  .sup-link:hover { color: var(--text); text-decoration: underline; }

  .btn-view {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--accent2); font-size: 11px; font-weight: 600; padding: 4px 10px;
    cursor: pointer; text-decoration: none; white-space: nowrap;
    transition: background .2s, border-color .2s;
    display: inline-block;
  }
  .btn-view:hover { background: var(--border); border-color: var(--accent); color: var(--text); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── Nav ─────────────────────────────────────── -->
<nav class="topnav">
  <div class="logo">Agnes<span>TheSecond</span></div>
  <a href="/">Chat</a>
  <a href="/cube/">Cube</a>
  <a href="/explorer/">Explorer</a>
  <a href="/agnes/">Insights</a>
  <a href="/sourcing/" class="active">Sourcing</a>
</nav>

<!-- ── Main ────────────────────────────────────── -->
<div class="main">
<div class="container">

  <!-- Input Form -->
  <div class="form-card">
    <h2>Product Sourcing</h2>
    <p class="subtitle">Define a product and its ingredients — we'll find the best suppliers from our network of 40 verified suppliers.</p>

    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="e.g. Premium Protein Bar">
      </div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Ingredients</label>
      <div class="tag-input-wrap" id="tagWrap">
        <input type="text" class="tag-input" id="tagInput"
               placeholder="Type an ingredient and press Enter…"
               autocomplete="off">
        <div class="autocomplete" id="acDropdown"></div>
      </div>
    </div>

    <button class="btn-source" id="sourceBtn" disabled>
      Find Suppliers
    </button>
  </div>

  <!-- Results -->
  <div id="results" class="hidden"></div>

</div>
</div>

<script>
const tagWrap = document.getElementById('tagWrap');
const tagInput = document.getElementById('tagInput');
const acDropdown = document.getElementById('acDropdown');
const sourceBtn = document.getElementById('sourceBtn');
const resultsDiv = document.getElementById('results');

let ingredients = [];
let knownIngredients = [];
let acIndex = -1;

// ── Load known ingredients for autocomplete ──
fetch('/sourcing/api/ingredients')
  .then(r => r.json())
  .then(data => { knownIngredients = data; });

// ── Tag management ───────────────────────────
function addTag(name) {
  name = name.trim();
  if (!name || ingredients.includes(name.toLowerCase())) return;
  ingredients.push(name.toLowerCase());

  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.innerHTML = `${escHtml(name)} <span class="remove">&times;</span>`;
  tag.querySelector('.remove').onclick = () => {
    ingredients = ingredients.filter(i => i !== name.toLowerCase());
    tag.remove();
    updateBtn();
  };
  tagWrap.insertBefore(tag, tagInput);
  tagInput.value = '';
  closeAC();
  updateBtn();
}

function updateBtn() {
  sourceBtn.disabled = ingredients.length === 0;
}

tagInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const items = acDropdown.querySelectorAll('.ac-item');
    if (acIndex >= 0 && items[acIndex]) {
      addTag(items[acIndex].dataset.name);
    } else if (tagInput.value.trim()) {
      addTag(tagInput.value);
    }
  } else if (e.key === 'Backspace' && !tagInput.value) {
    const tags = tagWrap.querySelectorAll('.tag');
    if (tags.length) {
      const last = tags[tags.length - 1];
      const name = last.textContent.replace('×', '').trim();
      ingredients = ingredients.filter(i => i !== name.toLowerCase());
      last.remove();
      updateBtn();
    }
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const items = acDropdown.querySelectorAll('.ac-item');
    if (!items.length) return;
    acIndex += e.key === 'ArrowDown' ? 1 : -1;
    acIndex = Math.max(-1, Math.min(acIndex, items.length - 1));
    items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
  } else if (e.key === 'Escape') {
    closeAC();
  }
});

tagInput.addEventListener('input', () => {
  const q = tagInput.value.trim().toLowerCase();
  if (q.length < 2) { closeAC(); return; }

  const filtered = knownIngredients
    .filter(k => k.name.toLowerCase().includes(q) || k.baseName.includes(q.replace(/ /g, '-')))
    .slice(0, 12);

  if (!filtered.length) { closeAC(); return; }

  acDropdown.innerHTML = filtered.map(k =>
    `<div class="ac-item" data-name="${escAttr(k.name)}">
       <span>${escHtml(k.name)}</span>
       <span class="count">${k.productCount} variant${k.productCount > 1 ? 's' : ''}</span>
     </div>`
  ).join('');
  acDropdown.classList.add('open');
  acIndex = -1;

  acDropdown.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('click', () => addTag(el.dataset.name));
  });
});

tagWrap.addEventListener('click', () => tagInput.focus());

function closeAC() {
  acDropdown.classList.remove('open');
  acDropdown.innerHTML = '';
  acIndex = -1;
}

document.addEventListener('click', e => {
  if (!tagWrap.contains(e.target)) closeAC();
});

// ── Source button ─────────────────────────────
sourceBtn.addEventListener('click', async () => {
  if (!ingredients.length) return;

  const product = document.getElementById('productName').value.trim() || 'Unnamed Product';

  sourceBtn.disabled = true;
  sourceBtn.innerHTML = '<span class="spinner"></span> Sourcing…';
  resultsDiv.classList.add('hidden');

  try {
    const res = await fetch('/sourcing/api/source', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product, ingredients }),
    });
    const data = await res.json();
    renderResults(data);
  } catch (err) {
    resultsDiv.innerHTML = `<div class="form-card" style="color:var(--danger)">Error: ${escHtml(err.message)}</div>`;
    resultsDiv.classList.remove('hidden');
  } finally {
    sourceBtn.disabled = false;
    sourceBtn.textContent = 'Find Suppliers';
  }
});

// ── Render results ───────────────────────────
function renderResults(data) {
  const s = data.summary;
  let html = '';

  // Summary bar
  html += `
    <div class="summary-bar">
      <div class="stat-card"><div class="label">Ingredients</div><div class="value">${s.total}</div></div>
      <div class="stat-card"><div class="label">Matched</div><div class="value">${s.matched}</div></div>
      <div class="stat-card"><div class="label">Unmatched</div><div class="value ${s.unmatched ? 'danger' : ''}">${s.unmatched}</div></div>
      <div class="stat-card"><div class="label">Single-Source Risks</div><div class="value ${s.singleSourceIngredients.length ? 'warn' : ''}">${s.singleSourceIngredients.length}</div></div>
      <div class="stat-card"><div class="label">Supplier Network</div><div class="value">${Object.keys(s.supplierCoverage).length}</div></div>
    </div>`;

  // Product title
  html += `<div class="results-title">
    <h3>Sourcing Report for <span class="product-name">${escHtml(data.product)}</span></h3>
  </div>`;

  // Ingredient cards
  for (const ing of data.ingredients) {
    const flags = ing.riskFlags || [];
    const isUnmatched = !ing.matched;
    html += `
      <div class="ingredient-card ${isUnmatched ? 'unmatched' : ''}" onclick="this.classList.toggle('open')">
        <div class="ing-header">
          <span class="arrow">▶</span>
          <span class="ing-name">${escHtml(ing.name)}${ing.query !== ing.name ? ` <span style="color:var(--text2);font-size:12px">(searched: "${escHtml(ing.query)}")</span>` : ''}</span>
          <div class="ing-badges">
            ${ing.matched ? `<span class="badge matched">Matched${ing.matchScore < 1 ? ` (${Math.round(ing.matchScore * 100)}%)` : ''}</span>` : '<span class="badge unmatched-b">Not Found</span>'}
            ${ing.suppliers ? `<span class="badge suppliers">${ing.suppliers.length} supplier${ing.suppliers.length !== 1 ? 's' : ''}</span>` : ''}
            ${flags.includes('single_source') ? '<span class="badge single-source">Single Source</span>' : ''}
            ${flags.includes('high_price_volatility') ? '<span class="badge risk">Volatile Price</span>' : ''}
            ${flags.includes('has_high_risk_supplier') ? '<span class="badge risk">High-Risk Supplier</span>' : ''}
          </div>
        </div>
        <div class="ing-detail">
          ${isUnmatched
            ? '<p style="color:var(--text2);padding:12px 0">This ingredient was not found in our database. Consider checking the spelling or using the chat to explore alternatives.</p>'
            : renderIngDetail(ing)
          }
        </div>
      </div>`;
  }

  // ── Optimal Supplier Combinations ────────────
  if (s.optimalCombos && s.optimalCombos.length) {
    html += `
      <div class="coverage-section">
        <h3>Optimal Supplier Combinations</h3>
        <p style="color:var(--text2);font-size:13px;margin-bottom:12px">Best ways to cover all your ingredients with the fewest suppliers.</p>
        <div class="combos-wrap">
          ${s.optimalCombos.map((combo, ci) => `
            <div class="combo-card">
              <div class="combo-header">
                <span class="combo-strategy">${escHtml(combo.strategy)}</span>
                <span class="combo-count">${combo.supplierCount} supplier${combo.supplierCount !== 1 ? 's' : ''}</span>
              </div>
              <p class="combo-desc">${escHtml(combo.description)}</p>
              <div class="combo-suppliers">
                ${combo.suppliers.map(cs => `
                  <div class="combo-supplier">
                    <div class="combo-sup-top">
                      <span class="combo-sup-name">${escHtml(cs.name)}</span>
                      <span class="tier-badge ${cs.riskTier || ''}">${cs.riskTier || '—'}</span>
                      ${cs.qualityScore != null ? `<span style="color:var(--text2);font-size:12px">Quality: ${cs.qualityScore.toFixed(1)}</span>` : ''}
                      <a href="/explorer/?tab=suppliers&search=${encodeURIComponent(cs.name)}" class="btn-view">View in Explorer ↗</a>
                    </div>
                    <div class="ing-list">
                      ${cs.covers.map(i => `<span class="ing-chip">${escHtml(i)}</span>`).join('')}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ── Ranked Supplier Table ──────────────────────
  if (s.rankedSuppliers && s.rankedSuppliers.length) {
    html += `
      <div class="coverage-section">
        <h3>All Suppliers Ranked by Coverage</h3>
        <p style="color:var(--text2);font-size:13px;margin-bottom:12px">Every supplier that can provide at least one ingredient, ranked by how many of your ingredients they cover.</p>
        <table class="sup-table">
          <thead><tr>
            <th>Supplier</th>
            <th>Coverage</th>
            <th>Ingredients</th>
            <th>Risk</th>
            <th>Quality</th>
            <th>Compliance</th>
            <th>Lead Time</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${s.rankedSuppliers.map(rs => `<tr>
              <td style="font-weight:600">${escHtml(rs.name)}</td>
              <td>
                <div class="coverage-bar-wrap">
                  <div class="coverage-bar" style="width:${rs.coveragePct}%"></div>
                  <span class="coverage-label">${rs.coverageCount}/${s.matched} (${rs.coveragePct}%)</span>
                </div>
              </td>
              <td><div class="ing-list">${rs.covers.map(i => `<span class="ing-chip">${escHtml(i)}</span>`).join('')}</div></td>
              <td><span class="tier-badge ${rs.riskTier || ''}">${rs.riskTier || '—'}</span></td>
              <td>${rs.qualityScore != null ? rs.qualityScore.toFixed(1) : '—'}</td>
              <td>${rs.complianceScore != null ? rs.complianceScore.toFixed(1) : '—'}</td>
              <td>${rs.leadTimeDays != null ? rs.leadTimeDays + 'd' : '—'}</td>
              <td><a href="/explorer/?tab=suppliers&search=${encodeURIComponent(rs.name)}" class="btn-view">View in Explorer ↗</a></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // Chat prompt
  html += `
    <div class="chat-prompt">
      <p>Have questions about these suppliers? Ask Agnes for deeper analysis.</p>
      <a href="/">Open Chat →</a>
    </div>`;

  resultsDiv.innerHTML = html;
  resultsDiv.classList.remove('hidden');
}

function renderIngDetail(ing) {
  let html = '';

  // Supplier table
  if (ing.suppliers && ing.suppliers.length) {
    html += `
      <table class="sup-table">
        <thead><tr>
          <th>Supplier</th>
          <th>Risk</th>
          <th>Avg Price</th>
          <th>Quality</th>
          <th>Compliance</th>
          <th>On-Time</th>
          <th>Lead Time</th>
          <th>Certifications</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${ing.suppliers.map(s => `<tr>
            <td style="font-weight:600">${escHtml(s.name)}</td>
            <td><span class="tier-badge ${s.riskTier || ''}">${s.riskTier || '—'}</span></td>
            <td>${s.avgPrice != null ? `$${s.avgPrice.toFixed(2)}/kg` : '—'}</td>
            <td>${s.qualityScore != null ? s.qualityScore.toFixed(1) : '—'}</td>
            <td>${s.complianceScore != null ? s.complianceScore.toFixed(1) : '—'}</td>
            <td>${s.onTimePct != null ? s.onTimePct.toFixed(0) + '%' : '—'}</td>
            <td>${s.leadTimeDays != null ? s.leadTimeDays + 'd' : '—'}</td>
            <td><div class="cert-chips">${(s.certifications || []).map(c => `<span class="cert-chip">${escHtml(c)}</span>`).join('')}</div></td>
            <td><a href="/explorer/?tab=suppliers&search=${encodeURIComponent(s.name)}" class="btn-view">View in Explorer ↗</a></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // Benchmark
  if (ing.benchmark) {
    const b = ing.benchmark;
    html += `
      <div class="benchmark-row">
        <div><span class="bm-label">Market Avg</span><br><span class="bm-val">$${b.avgMarketPrice.toFixed(2)}/kg</span></div>
        <div><span class="bm-label">Market Range</span><br><span class="bm-val">$${b.minPrice.toFixed(2)} – $${b.maxPrice.toFixed(2)}</span></div>
        <div><span class="bm-label">Price Volatility</span><br><span class="bm-val">${(b.priceVolatility * 100).toFixed(0)}%</span></div>
        <div><span class="bm-label">Used By</span><br><span class="bm-val">${ing.companyCount} companies</span></div>
      </div>`;
  }

  // Alternative matches
  if (ing.matches && ing.matches.length) {
    html += `
      <div class="alt-matches">
        Also similar: ${ing.matches.map(m => `<span onclick="event.stopPropagation()">${escHtml(m.name)} (${Math.round(m.score * 100)}%)</span>`).join(', ')}
      </div>`;
  }

  return html;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
</script>
</body>
</html>
