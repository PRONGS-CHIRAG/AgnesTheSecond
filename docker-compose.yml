# Optional dev convenience. The demo also runs fine with two local terminals
# (`uv run uvicorn agnes.api.main:app --reload` and `npm run dev` in frontend/).
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGNES_REPORTS_DIR: /workspace/outputs/reports
      AGNES_REPO_ROOT: /workspace
      AGNES_API_CORS_ORIGINS: http://localhost:3000
      AGNES_OPENAI_API_KEY: ${AGNES_OPENAI_API_KEY:-}
      AGNES_TAVILY_API_KEY: ${AGNES_TAVILY_API_KEY:-}
      AGNES_LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
    command: >-
      uvicorn agnes.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    command: >-
      node_modules/.bin/next start -p 3000
