name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guards:
    name: Static guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify chirag does not import taim
        run: bash chirag/scripts/check_no_taim_imports.sh

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    needs: guards
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: chirag
        run: uv sync --frozen || uv sync
      - name: Run pytest
        working-directory: chirag
        env:
          AGNES_OPENAI_API_KEY: ""
        run: uv run --with pytest pytest tests -q
